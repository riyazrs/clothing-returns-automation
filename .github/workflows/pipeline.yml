name: Clothing Returns Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic images
        run: python generate_images.py

      - name: Run full pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python orchestrator.py

      - name: Export results to JSON for GitHub Pages
        run: python export_results.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/Returns_Queue.xlsx returns_log.txt docs/results.json data/images/
          git diff --cached --quiet || git commit -m "Pipeline run results - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
